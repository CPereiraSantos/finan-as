<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dindin Casinha 🖤</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<h1>Dindin Casinha 🖤</h1>
<p>Controle financeiro da casa</p>
</header>

<section class="cards">

<div class="card">
<span>💰 Salários</span>
<h2 id="salarios">R$0</h2>
</div>

<div class="card">
<span>💸 Contas</span>
<h2 id="despesas">R$0</h2>
</div>

<div class="card">
<span>🏠 Sobra</span>
<h2 id="sobra">R$0</h2>
</div>

<div class="card">
<span>➗ Cada um paga</span>
<h2 id="divisao">R$0</h2>
</div>

</section>

<section class="family">

<div class="person">
<h3 id="pessoa1">Pessoa 1</h3>
<p id="sobra1">R$0</p>
</div>

<div class="person">
<h3 id="pessoa2">Pessoa 2</h3>
<p id="sobra2">R$0</p>
</div>

</section>

<section class="form-box">

<h2>💰 Salários</h2>

<input id="nome1" placeholder="Nome 1">
<input id="valor1" type="number" placeholder="Valor">

<input id="nome2" placeholder="Nome 2">
<input id="valor2" type="number" placeholder="Valor">

<button onclick="salvarSalarios()">Salvar</button>

</section>

<section class="form-box">

<h2>💸 Nova Conta</h2>

<input id="descricao" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">

<button onclick="addDespesa()">Adicionar</button>

</section>

<section class="lista">

<h2>📋 Contas</h2>

<ul id="gastos"></ul>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
